server:
  port: 8085
spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:

        - id: kyc-service
          uri: http://localhost:8082
          predicates:
            - Path= /api/v1 /career/**

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path= /api/v1/auth/**, /api/v1/account/**, /api/v1/accounting/**, /api/v1/subscription/**,

        - id: emergency-service
          uri: http://localhost:8083
          predicates:
            - Path= /api/v1/emergency/**, /api/v1/disease/**, /api/v1/allergy/**, /api/v1/symptom/**
