server:
  port: 8085
spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true    # Включение автоматического маршрутизации через Eureka
          lower-case-service-id: true

      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/accounting/users
            - Method=POST

        - id: user-management
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/accounting/**, /api/v1/account, /api/v1/user-management/**

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/account/**, /api/v1/auth-service/**

    #rewrite it

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /MEDNew.yaml
    config-url: /v3/api-docs/swagger-config
    operationsSorter: method
    tagsSorter: alpha